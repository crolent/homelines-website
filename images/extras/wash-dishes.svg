<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Soapy water base -->
  <ellipse cx="26" cy="42" rx="14" ry="4" fill="#B3E5FC" opacity="0.5"/>
  <!-- Plate outer -->
  <circle cx="26" cy="30" r="13" fill="#FFFFFF" stroke="#90A4AE" stroke-width="2"/>
  <!-- Plate rim color -->
  <circle cx="26" cy="30" r="13" fill="none" stroke="#FF7043" stroke-width="3" stroke-dasharray="8,4"/>
  <!-- Plate inner ring -->
  <circle cx="26" cy="30" r="8" fill="none" stroke="#90A4AE" stroke-width="1.5"/>
  <!-- Plate shine -->
  <path d="M20 25 Q23 22 26 25" fill="none" stroke="#B3E5FC" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Fork handle -->
  <line x1="9" y1="38" x2="9" y2="22" stroke="#8D6E63" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Fork tines -->
  <path d="M7 22 L7 26 Q9 28 11 26 L11 22" fill="none" stroke="#8D6E63" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Bubbles -->
  <circle cx="15" cy="13" r="3"   fill="#B3E5FC" stroke="#26C6DA" stroke-width="1.5"/>
  <circle cx="24" cy="9"  r="3.5" fill="#B3E5FC" stroke="#26C6DA" stroke-width="1.5"/>
  <circle cx="33" cy="12" r="2.5" fill="#B3E5FC" stroke="#26C6DA" stroke-width="1.5"/>
  <!-- Bubble shine -->
  <circle cx="13" cy="11" r="1"   fill="white" opacity="0.8"/>
  <circle cx="22" cy="8"  r="1.2" fill="white" opacity="0.8"/>
</svg>
