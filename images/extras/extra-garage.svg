<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Roof (red) -->
  <polygon points="2,20 24,5 46,20" fill="#EF5350"/>
  <polyline points="2,20 24,5 46,20" fill="none" stroke="#C62828" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Roof trim -->
  <rect x="2" y="19" width="44" height="3" rx="1" fill="#B71C1C"/>
  <!-- Building walls (warm beige) -->
  <rect x="3" y="22" width="42" height="24" fill="#FFF9C4" stroke="#8D6E63" stroke-width="2"/>
  <!-- Left door (light gray) -->
  <rect x="4"  y="23" width="19" height="22" rx="1" fill="#ECEFF1" stroke="#90A4AE" stroke-width="1"/>
  <!-- Right door (light gray) -->
  <rect x="25" y="23" width="19" height="22" rx="1" fill="#ECEFF1" stroke="#90A4AE" stroke-width="1"/>
  <!-- Center door divider -->
  <line x1="24" y1="22" x2="24" y2="46" stroke="#8D6E63" stroke-width="1.8"/>
  <!-- Left door panel lines -->
  <line x1="5"  y1="29" x2="22" y2="29" stroke="#B0BEC5" stroke-width="1.2"/>
  <line x1="5"  y1="35" x2="22" y2="35" stroke="#B0BEC5" stroke-width="1.2"/>
  <line x1="5"  y1="41" x2="22" y2="41" stroke="#B0BEC5" stroke-width="1.2"/>
  <!-- Right door panel lines -->
  <line x1="26" y1="29" x2="43" y2="29" stroke="#B0BEC5" stroke-width="1.2"/>
  <line x1="26" y1="35" x2="43" y2="35" stroke="#B0BEC5" stroke-width="1.2"/>
  <line x1="26" y1="41" x2="43" y2="41" stroke="#B0BEC5" stroke-width="1.2"/>
  <!-- Door handles (gold) -->
  <line x1="18" y1="36" x2="22" y2="36" stroke="#FFD54F" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="26" y1="36" x2="30" y2="36" stroke="#FFD54F" stroke-width="2.5" stroke-linecap="round"/>
</svg>
