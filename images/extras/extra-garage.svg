<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Roof -->
  <polyline points="2,20 24,6 46,20" fill="none" stroke="#1a2b4a" stroke-width="2.2" stroke-linejoin="round"/>
  <polygon points="2,20 24,6 46,20 46,22 2,22" fill="#1a2b4a"/>
  <!-- Building walls -->
  <rect x="3" y="21" width="42" height="25" fill="#e8f4fd" stroke="#1a2b4a" stroke-width="2"/>
  <!-- Center door divider -->
  <line x1="24" y1="21" x2="24" y2="46" stroke="#1a2b4a" stroke-width="1.8"/>
  <!-- Left door panel lines -->
  <line x1="4"  y1="27" x2="23" y2="27" stroke="#1a2b4a" stroke-width="1.2"/>
  <line x1="4"  y1="33" x2="23" y2="33" stroke="#1a2b4a" stroke-width="1.2"/>
  <line x1="4"  y1="39" x2="23" y2="39" stroke="#1a2b4a" stroke-width="1.2"/>
  <!-- Right door panel lines -->
  <line x1="25" y1="27" x2="44" y2="27" stroke="#1a2b4a" stroke-width="1.2"/>
  <line x1="25" y1="33" x2="44" y2="33" stroke="#1a2b4a" stroke-width="1.2"/>
  <line x1="25" y1="39" x2="44" y2="39" stroke="#1a2b4a" stroke-width="1.2"/>
  <!-- Door handles -->
  <line x1="18" y1="35" x2="22" y2="35" stroke="#4db8e8" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="26" y1="35" x2="30" y2="35" stroke="#4db8e8" stroke-width="2.2" stroke-linecap="round"/>
</svg>
