<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Garage door frame (warm gray) -->
  <rect x="3" y="8" width="30" height="36" rx="2" fill="#ECEFF1" stroke="#546E7A" stroke-width="2"/>
  <!-- Garage door panels (darker stripes) -->
  <rect x="4"  y="9"  width="28" height="8" rx="1" fill="#CFD8DC"/>
  <rect x="4"  y="18" width="28" height="8" rx="1" fill="#CFD8DC"/>
  <rect x="4"  y="27" width="28" height="8" rx="1" fill="#CFD8DC"/>
  <rect x="4"  y="36" width="28" height="8" rx="1" fill="#CFD8DC"/>
  <!-- Panel dividers -->
  <line x1="3"  y1="17" x2="33" y2="17" stroke="#90A4AE" stroke-width="1"/>
  <line x1="3"  y1="26" x2="33" y2="26" stroke="#90A4AE" stroke-width="1"/>
  <line x1="3"  y1="35" x2="33" y2="35" stroke="#90A4AE" stroke-width="1"/>
  <!-- Garage handle (gold) -->
  <line x1="14" y1="30" x2="22" y2="30" stroke="#FFD54F" stroke-width="3" stroke-linecap="round"/>
  <!-- Broom handle (brown wood) -->
  <line x1="34" y1="5" x2="44" y2="38" stroke="#8D6E63" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Broom head (amber/orange) -->
  <rect x="39" y="36" width="9" height="6" rx="2" fill="#FF8F00" transform="rotate(-15 43 39)"/>
  <rect x="39" y="36" width="9" height="6" rx="2" fill="none" stroke="#E65100" stroke-width="1" transform="rotate(-15 43 39)"/>
  <!-- Dust particles -->
  <circle cx="36" cy="44" r="1.5" fill="#B0BEC5"/>
  <circle cx="33" cy="46" r="1"   fill="#B0BEC5" opacity="0.6"/>
  <circle cx="39" cy="46" r="1"   fill="#B0BEC5" opacity="0.7"/>
</svg>
