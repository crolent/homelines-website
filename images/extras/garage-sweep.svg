<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Garage door frame -->
  <rect x="3" y="8" width="30" height="36" rx="2" fill="#e8f4fd" stroke="#1a2b4a" stroke-width="2"/>
  <!-- Garage door panel lines -->
  <line x1="3"  y1="17" x2="33" y2="17" stroke="#1a2b4a" stroke-width="1.5"/>
  <line x1="3"  y1="26" x2="33" y2="26" stroke="#1a2b4a" stroke-width="1.5"/>
  <line x1="3"  y1="35" x2="33" y2="35" stroke="#1a2b4a" stroke-width="1.5"/>
  <!-- Garage handle -->
  <line x1="14" y1="30" x2="22" y2="30" stroke="#1a2b4a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Broom handle -->
  <line x1="34" y1="5" x2="44" y2="38" stroke="#1a2b4a" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Broom head -->
  <ellipse cx="44" cy="41" rx="4" ry="3" fill="#4db8e8" transform="rotate(-15 44 41)"/>
  <rect x="40" y="38" width="8" height="5" rx="2" fill="#4db8e8" transform="rotate(-15 44 41)"/>
  <!-- Sweep dust lines -->
  <path d="M36 43 Q39 46 43 44" fill="none" stroke="#4db8e8" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M34 46 Q37 48 41 47" fill="none" stroke="#4db8e8" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>
