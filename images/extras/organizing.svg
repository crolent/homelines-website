<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Shelf unit sides -->
  <rect x="4" y="4" width="40" height="40" rx="2" fill="none" stroke="#1a2b4a" stroke-width="2"/>
  <!-- Shelf 1 -->
  <line x1="4" y1="18" x2="44" y2="18" stroke="#1a2b4a" stroke-width="2"/>
  <!-- Shelf 2 -->
  <line x1="4" y1="32" x2="44" y2="32" stroke="#1a2b4a" stroke-width="2"/>
  <!-- Top shelf items -->
  <rect x="7"  y="8"  width="5" height="10" rx="1" fill="#4db8e8"/>
  <rect x="14" y="10" width="4" height="8"  rx="1" fill="#1a2b4a" opacity="0.35"/>
  <rect x="20" y="8"  width="6" height="10" rx="1" fill="#4db8e8" opacity="0.7"/>
  <rect x="28" y="9"  width="4" height="9"  rx="1" fill="#1a2b4a" opacity="0.35"/>
  <rect x="34" y="8"  width="5" height="10" rx="1" fill="#4db8e8"/>
  <!-- Middle shelf items -->
  <rect x="7"  y="22" width="4" height="10" rx="1" fill="#1a2b4a" opacity="0.35"/>
  <rect x="13" y="20" width="6" height="12" rx="1" fill="#4db8e8"/>
  <rect x="21" y="22" width="4" height="10" rx="1" fill="#4db8e8" opacity="0.7"/>
  <rect x="27" y="21" width="5" height="11" rx="1" fill="#1a2b4a" opacity="0.35"/>
  <rect x="34" y="22" width="5" height="10" rx="1" fill="#4db8e8"/>
  <!-- Bottom shelf items -->
  <rect x="7"  y="34" width="7" height="8" rx="1" fill="#4db8e8" opacity="0.7"/>
  <rect x="17" y="35" width="5" height="7" rx="1" fill="#1a2b4a" opacity="0.35"/>
  <rect x="24" y="33" width="6" height="9" rx="1" fill="#4db8e8"/>
  <rect x="32" y="35" width="7" height="7" rx="1" fill="#1a2b4a" opacity="0.35"/>
