<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Wall (light yellow) -->
  <rect x="8" y="4" width="38" height="38" fill="#FFF9C4"/>
  <!-- Floor (warm wood) -->
  <rect x="2" y="38" width="44" height="10" rx="2" fill="#8D6E63"/>
  <line x1="2" y1="40" x2="46" y2="40" stroke="#6D4C41" stroke-width="1" opacity="0.4"/>
  <line x1="2" y1="43" x2="46" y2="43" stroke="#6D4C41" stroke-width="1" opacity="0.3"/>
  <!-- Wall left edge -->
  <rect x="2" y="4" width="6" height="38" fill="#B0BEC5"/>
  <!-- Baseboard strip (white) -->
  <rect x="8" y="33" width="38" height="5" rx="1" fill="#ECEFF1" stroke="#90A4AE" stroke-width="1.5"/>
  <!-- Brush body (orange) -->
  <rect x="26" y="15" width="15" height="9" rx="2" fill="#FF7043" stroke="#E64A19" stroke-width="1.5"/>
  <!-- Brush handle (brown) -->
  <line x1="33" y1="15" x2="25" y2="5" stroke="#8D6E63" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Brush bristles (teal/blue) -->
  <line x1="27" y1="24" x2="26" y2="33" stroke="#26C6DA" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="29" y1="24" x2="29" y2="33" stroke="#26C6DA" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="31" y1="24" x2="31" y2="33" stroke="#29B6F6" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="33" y1="24" x2="33" y2="33" stroke="#26C6DA" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="35" y1="24" x2="36" y2="33" stroke="#29B6F6" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="37" y1="24" x2="38" y2="33" stroke="#26C6DA" stroke-width="1.8" stroke-linecap="round"/>
</svg>
