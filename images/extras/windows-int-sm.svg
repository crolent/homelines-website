<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Window frame -->
  <rect x="6" y="8" width="36" height="32" rx="3" fill="#ECEFF1" stroke="#546E7A" stroke-width="2.2"/>
  <!-- Glass panes (sky blue) -->
  <rect x="7"  y="9"  width="16" height="14" rx="1" fill="#B3E5FC"/>
  <rect x="25" y="9"  width="16" height="14" rx="1" fill="#B3E5FC"/>
  <rect x="7"  y="25" width="16" height="14" rx="1" fill="#B3E5FC"/>
  <rect x="25" y="25" width="16" height="14" rx="1" fill="#B3E5FC"/>
  <!-- Cross bars -->
  <line x1="24" y1="8"  x2="24" y2="40" stroke="#546E7A" stroke-width="2"/>
  <line x1="6"  y1="24" x2="42" y2="24" stroke="#546E7A" stroke-width="2"/>
  <!-- Squeegee blade (orange) -->
  <rect x="8" y="11" width="13" height="4" rx="2" fill="#FF7043"/>
  <!-- Squeegee handle (brown) -->
  <line x1="14" y1="15" x2="21" y2="23" stroke="#8D6E63" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Clean streak lines -->
  <path d="M9 17 Q15 15 22 17" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <path d="M9 20 Q15 18 22 20" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
</svg>
