<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Window frame -->
  <rect x="6" y="8" width="36" height="32" rx="3" fill="#e8f4fd" stroke="#1a2b4a" stroke-width="2.2"/>
  <!-- Pane cross bars -->
  <line x1="24" y1="8"  x2="24" y2="40" stroke="#1a2b4a" stroke-width="2"/>
  <line x1="6"  y1="24" x2="42" y2="24" stroke="#1a2b4a" stroke-width="2"/>
  <!-- Squeegee blade (top-left pane) -->
  <rect x="8" y="11" width="13" height="4" rx="2" fill="#4db8e8"/>
  <!-- Squeegee handle -->
  <line x1="14" y1="15" x2="21" y2="23" stroke="#1a2b4a" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Clean water streak lines -->
  <path d="M9 17 Q15 15 22 17" fill="none" stroke="#4db8e8" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <path d="M9 20 Q15 18 22 20" fill="none" stroke="#4db8e8" stroke-width="1" stroke-linecap="round" opacity="0.3"/>
</svg>
