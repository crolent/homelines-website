<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Microwave body -->
  <rect x="5" y="10" width="38" height="28" rx="5" fill="#ECEFF1" stroke="#546E7A" stroke-width="2"/>

  <!-- Door window -->
  <rect x="9" y="14" width="22" height="20" rx="3" fill="#1E3A5C" opacity="0.95"/>
  <rect x="10.5" y="15.5" width="19" height="17" rx="2.4" fill="#4DB6E8" opacity="0.18"/>

  <!-- Control panel -->
  <rect x="33" y="14" width="6" height="20" rx="3" fill="#B3E5FC" stroke="#4DB6E8" stroke-width="1.4"/>

  <!-- Colorful buttons -->
  <circle cx="36" cy="18" r="1.3" fill="#EF5350"/>
  <circle cx="36" cy="22" r="1.3" fill="#FFD54F"/>
  <circle cx="36" cy="26" r="1.3" fill="#66BB6A"/>
  <circle cx="36" cy="30" r="1.3" fill="#29B6F6"/>

  <!-- Handle -->
  <rect x="29.5" y="16" width="1.8" height="16" rx="0.9" fill="#90A4AE"/>

  <!-- Plate line inside -->
  <path d="M13 28c3.5 2.2 10.5 2.2 14 0" fill="none" stroke="#FFD54F" stroke-width="2" stroke-linecap="round" opacity="0.65"/>

  <!-- Small heat wave -->
  <path d="M15 12q-1.6-2 0-4" fill="none" stroke="#FF7043" stroke-width="2" stroke-linecap="round"/>
  <path d="M21 12q-1.6-2 0-4" fill="none" stroke="#FF7043" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
</svg>
