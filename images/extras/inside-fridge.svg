<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Fridge body (icy white) -->
  <rect x="7" y="3" width="34" height="43" rx="4" fill="#ECEFF1" stroke="#546E7A" stroke-width="2"/>
  <!-- Freezer section (light icy blue) -->
  <rect x="8" y="4" width="32" height="13" rx="3" fill="#B3E5FC"/>
  <!-- Freezer divider -->
  <line x1="7" y1="17" x2="41" y2="17" stroke="#546E7A" stroke-width="2"/>
  <!-- Main section shelves (transparent blue) -->
  <line x1="9"  y1="27" x2="39" y2="27" stroke="#26C6DA" stroke-width="2"/>
  <line x1="9"  y1="36" x2="39" y2="36" stroke="#26C6DA" stroke-width="2"/>
  <!-- Shelf 1 items (colorful food) -->
  <rect x="11" y="19" width="6" height="8"  rx="1.5" fill="#EF5350"/>
  <rect x="20" y="20" width="4" height="7"  rx="1.5" fill="#66BB6A"/>
  <rect x="27" y="19" width="5" height="8"  rx="1.5" fill="#FF7043"/>
  <!-- Shelf 2 items (colorful food) -->
  <rect x="11" y="29" width="4" height="7"  rx="1.5" fill="#AB47BC"/>
  <rect x="17" y="28" width="6" height="8"  rx="1.5" fill="#FFD54F"/>
  <rect x="26" y="29" width="5" height="7"  rx="1.5" fill="#29B6F6"/>
  <!-- Door handle (silver) -->
  <rect x="38" y="26" width="3" height="12" rx="1.5" fill="#90A4AE"/>
  <!-- Snowflake (bright cyan) -->
  <line x1="24" y1="6"  x2="24" y2="14" stroke="#0097A7" stroke-width="2"   stroke-linecap="round"/>
  <line x1="20" y1="10" x2="28" y2="10" stroke="#0097A7" stroke-width="2"   stroke-linecap="round"/>
  <line x1="21" y1="7"  x2="27" y2="13" stroke="#0097A7" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27" y1="7"  x2="21" y2="13" stroke="#0097A7" stroke-width="1.5" stroke-linecap="round"/>
</svg>
