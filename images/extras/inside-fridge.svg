<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Fridge body -->
  <rect x="7" y="3" width="34" height="43" rx="4" fill="#e8f4fd" stroke="#1a2b4a" stroke-width="2"/>
  <!-- Freezer divider -->
  <line x1="7" y1="17" x2="41" y2="17" stroke="#1a2b4a" stroke-width="2"/>
  <!-- Main section shelves -->
  <line x1="9"  y1="27" x2="39" y2="27" stroke="#4db8e8" stroke-width="1.8"/>
  <line x1="9"  y1="36" x2="39" y2="36" stroke="#4db8e8" stroke-width="1.8"/>
  <!-- Items on shelf 1 (between 17-27) -->
  <rect x="11" y="19" width="6" height="8"  rx="1.5" fill="#4db8e8" opacity="0.6"/>
  <rect x="20" y="21" width="4" height="6"  rx="1.5" fill="#1a2b4a" opacity="0.3"/>
  <rect x="27" y="19" width="5" height="8"  rx="1.5" fill="#4db8e8" opacity="0.4"/>
  <!-- Items on shelf 2 (between 27-36) -->
  <rect x="11" y="29" width="4" height="7"  rx="1.5" fill="#1a2b4a" opacity="0.3"/>
  <rect x="17" y="28" width="6" height="8"  rx="1.5" fill="#4db8e8" opacity="0.6"/>
  <rect x="26" y="29" width="5" height="7"  rx="1.5" fill="#4db8e8" opacity="0.4"/>
  <!-- Door handle -->
  <line x1="39" y1="26" x2="39" y2="38" stroke="#1a2b4a" stroke-width="3" stroke-linecap="round"/>
  <!-- Snowflake in freezer compartment -->
  <line x1="24" y1="7"  x2="24" y2="15" stroke="#4db8e8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="11" x2="28" y2="11" stroke="#4db8e8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21" y1="8"  x2="27" y2="14" stroke="#4db8e8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="27" y1="8"  x2="21" y2="14" stroke="#4db8e8" stroke-width="1.5" stroke-linecap="round"/>
</svg>
