<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Cabinet body -->
  <rect x="5" y="7" width="38" height="37" rx="3" fill="#FFF8E1" stroke="#6D4C41" stroke-width="2"/>
  <!-- Center vertical divider -->
  <line x1="24" y1="7" x2="24" y2="44" stroke="#6D4C41" stroke-width="1.8"/>
  <!-- Shelves -->
  <line x1="6"  y1="24" x2="23" y2="24" stroke="#8D6E63" stroke-width="2"/>
  <line x1="25" y1="24" x2="42" y2="24" stroke="#8D6E63" stroke-width="2"/>
  <!-- Left shelf items: red jar, green bottle, orange can -->
  <rect x="8"  y="14" width="5" height="10" rx="2" fill="#EF5350"/>
  <circle cx="10.5" cy="13" r="2" fill="#EF5350"/>
  <rect x="15" y="16" width="4" height="8"  rx="2" fill="#66BB6A"/>
  <rect x="20" y="15" width="3" height="9"  rx="1.5" fill="#FF7043"/>
  <line x1="20" y1="19" x2="23" y2="19" stroke="#FFF8E1" stroke-width="1" opacity="0.7"/>
  <!-- Right shelf items: purple jar, teal bottle, yellow box -->
  <rect x="26" y="14" width="4" height="10" rx="2" fill="#AB47BC"/>
  <circle cx="28" cy="13" r="2" fill="#AB47BC"/>
  <rect x="32" y="15" width="5" height="9"  rx="2" fill="#26C6DA"/>
  <rect x="38" y="14" width="3" height="10" rx="1.5" fill="#FFD54F"/>
  <line x1="38" y1="18" x2="41" y2="18" stroke="#FFF8E1" stroke-width="1" opacity="0.7"/>
  <!-- Door knobs (gold) -->
  <circle cx="20.5" cy="35" r="2.5" fill="#FFD54F" stroke="#F9A825" stroke-width="1"/>
  <circle cx="27.5" cy="35" r="2.5" fill="#FFD54F" stroke="#F9A825" stroke-width="1"/>
</svg>
