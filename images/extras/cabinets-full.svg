<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Cabinet body -->
  <rect x="5" y="7" width="38" height="37" rx="3" fill="#e8f4fd" stroke="#1a2b4a" stroke-width="2"/>
  <!-- Center vertical divider -->
  <line x1="24" y1="7" x2="24" y2="44" stroke="#1a2b4a" stroke-width="1.8"/>
  <!-- Shelf lines -->
  <line x1="6" y1="24" x2="23" y2="24" stroke="#4db8e8" stroke-width="1.5"/>
  <line x1="25" y1="24" x2="42" y2="24" stroke="#4db8e8" stroke-width="1.5"/>
  <!-- Items left shelf -->
  <rect x="8"  y="14" width="5" height="10" rx="1.5" fill="#4db8e8"/>
  <rect x="15" y="16" width="4" height="8"  rx="1.5" fill="#1a2b4a" opacity="0.35"/>
  <rect x="20" y="15" width="3" height="9"  rx="1.5" fill="#4db8e8" opacity="0.65"/>
  <!-- Items right shelf -->
  <rect x="26" y="14" width="4" height="10" rx="1.5" fill="#1a2b4a" opacity="0.35"/>
  <rect x="32" y="15" width="5" height="9"  rx="1.5" fill="#4db8e8"/>
  <rect x="38" y="14" width="3" height="10" rx="1.5" fill="#4db8e8" opacity="0.65"/>
  <!-- Door knobs -->
  <circle cx="20.5" cy="35" r="2" fill="#1a2b4a"/>
  <circle cx="27.5" cy="35" r="2" fill="#1a2b4a"/>
</svg>
