<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Cabinet body -->
  <rect x="5" y="7" width="38" height="37" rx="3" fill="#e8f4fd" stroke="#1a2b4a" stroke-width="2"/>
  <!-- Center vertical divider -->
  <line x1="24" y1="7" x2="24" y2="44" stroke="#1a2b4a" stroke-width="1.8"/>
  <!-- Top horizontal shelf (left side) -->
  <line x1="6" y1="22" x2="23" y2="22" stroke="#4db8e8" stroke-width="1.5"/>
  <!-- Top horizontal shelf (right side) -->
  <line x1="25" y1="22" x2="42" y2="22" stroke="#4db8e8" stroke-width="1.5"/>
  <!-- Hinges left -->
  <rect x="5" y="12" width="4" height="4" rx="1" fill="#1a2b4a"/>
  <rect x="5" y="35" width="4" height="4" rx="1" fill="#1a2b4a"/>
  <!-- Hinges right -->
  <rect x="39" y="12" width="4" height="4" rx="1" fill="#1a2b4a"/>
  <rect x="39" y="35" width="4" height="4" rx="1" fill="#1a2b4a"/>
  <!-- Door knobs -->
  <circle cx="20.5" cy="30" r="2" fill="#1a2b4a"/>
  <circle cx="27.5" cy="30" r="2" fill="#1a2b4a"/>
</svg>
