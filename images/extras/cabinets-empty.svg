<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Cabinet body -->
  <rect x="5" y="7" width="38" height="37" rx="3" fill="#FFF8E1" stroke="#8D6E63" stroke-width="2"/>
  <!-- Cabinet frame overlay -->
  <rect x="5" y="7" width="38" height="37" rx="3" fill="none" stroke="#6D4C41" stroke-width="2"/>
  <!-- Wood grain lines -->
  <line x1="6"  y1="12" x2="23" y2="12" stroke="#D7CCC8" stroke-width="1" opacity="0.6"/>
  <line x1="6"  y1="15" x2="23" y2="15" stroke="#D7CCC8" stroke-width="1" opacity="0.4"/>
  <line x1="25" y1="12" x2="42" y2="12" stroke="#D7CCC8" stroke-width="1" opacity="0.6"/>
  <line x1="25" y1="15" x2="42" y2="15" stroke="#D7CCC8" stroke-width="1" opacity="0.4"/>
  <!-- Center vertical divider -->
  <line x1="24" y1="7" x2="24" y2="44" stroke="#6D4C41" stroke-width="1.8"/>
  <!-- Shelves -->
  <line x1="6"  y1="22" x2="23" y2="22" stroke="#8D6E63" stroke-width="2"/>
  <line x1="25" y1="22" x2="42" y2="22" stroke="#8D6E63" stroke-width="2"/>
  <!-- Hinges left -->
  <rect x="5" y="12" width="4" height="4" rx="1" fill="#546E7A"/>
  <rect x="5" y="35" width="4" height="4" rx="1" fill="#546E7A"/>
  <!-- Hinges right -->
  <rect x="39" y="12" width="4" height="4" rx="1" fill="#546E7A"/>
  <rect x="39" y="35" width="4" height="4" rx="1" fill="#546E7A"/>
  <!-- Door knobs (gold) -->
  <circle cx="20.5" cy="30" r="2.5" fill="#FFD54F" stroke="#F9A825" stroke-width="1"/>
  <circle cx="27.5" cy="30" r="2.5" fill="#FFD54F" stroke="#F9A825" stroke-width="1"/>
</svg>
