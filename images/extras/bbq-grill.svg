<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Steam/flame wisps (orange) -->
  <path d="M15 11 Q13 8 15 5" fill="none" stroke="#FF7043" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M24 10 Q22 7 24 4" fill="none" stroke="#FFD54F" stroke-width="2.2" stroke-linecap="round"/>
  <path d="M33 11 Q31 8 33 5" fill="none" stroke="#FF7043" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Grill lid (charcoal dark) -->
  <path d="M8 26 A16 12 0 0 1 40 26 Z" fill="#546E7A"/>
  <!-- Lid handle (silver) -->
  <line x1="22" y1="15" x2="26" y2="15" stroke="#B0BEC5" stroke-width="3" stroke-linecap="round"/>
  <!-- Grill bowl (slightly lighter) -->
  <path d="M8 26 Q9 36 24 36 Q39 36 40 26 Z" fill="#78909C" stroke="#37474F" stroke-width="2"/>
  <!-- Coals glow (red-orange) -->
  <ellipse cx="24" cy="34" rx="10" ry="2" fill="#FF5722" opacity="0.5"/>
  <!-- Grill grate lines (bright) -->
  <line x1="13" y1="30" x2="35" y2="30" stroke="#CFD8DC" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="33" x2="36" y2="33" stroke="#CFD8DC" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Legs (dark gray) -->
  <line x1="16" y1="36" x2="11" y2="46" stroke="#37474F" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="36" x2="37" y2="46" stroke="#37474F" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cross bar -->
  <line x1="13" y1="43" x2="35" y2="43" stroke="#37474F" stroke-width="2" stroke-linecap="round"/>
</svg>
