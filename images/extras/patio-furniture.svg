<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Chair back (green) -->
  <rect x="8" y="8" width="18" height="22" rx="3" fill="#66BB6A" stroke="#388E3C" stroke-width="2"/>
  <!-- Chair seat (green) -->
  <rect x="6" y="28" width="24" height="8" rx="3" fill="#66BB6A" stroke="#388E3C" stroke-width="2"/>
  <!-- Chair back slats (dark green) -->
  <line x1="13" y1="12" x2="13" y2="26" stroke="#1B5E20" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="18" y1="12" x2="18" y2="26" stroke="#1B5E20" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="23" y1="12" x2="23" y2="26" stroke="#1B5E20" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Chair legs (brown) -->
  <line x1="10" y1="36" x2="8"  y2="46" stroke="#8D6E63" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="26" y1="36" x2="28" y2="46" stroke="#8D6E63" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cleaning cloth (teal/cyan, draped over back) -->
  <path d="M26 10 Q33 7 37 14 Q39 21 34 25 Q30 27 27 22 Q30 16 26 14 Z" fill="#26C6DA" stroke="#00838F" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Cloth texture lines -->
  <line x1="29" y1="12" x2="35" y2="18" stroke="white" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
  <line x1="27" y1="16" x2="33" y2="22" stroke="white" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
  <!-- Cloth shine -->
  <circle cx="32" cy="13" r="1.5" fill="white" opacity="0.5"/>
</svg>
