<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Chair back -->
  <rect x="8" y="8" width="18" height="22" rx="3" fill="#e8f4fd" stroke="#1a2b4a" stroke-width="2"/>
  <!-- Chair seat -->
  <rect x="6" y="28" width="24" height="8" rx="3" fill="#e8f4fd" stroke="#1a2b4a" stroke-width="2"/>
  <!-- Chair back slats -->
  <line x1="13" y1="12" x2="13" y2="26" stroke="#4db8e8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18" y1="12" x2="18" y2="26" stroke="#4db8e8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="23" y1="12" x2="23" y2="26" stroke="#4db8e8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Chair legs -->
  <line x1="10" y1="36" x2="8"  y2="46" stroke="#1a2b4a" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="26" y1="36" x2="28" y2="46" stroke="#1a2b4a" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Cleaning cloth (draped over back) -->
  <path d="M26 10 Q32 8 36 14 Q38 20 34 24 Q30 26 28 22 Q30 16 26 14 Z" fill="#4db8e8" opacity="0.75" stroke="#1a2b4a" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Cloth shine -->
  <circle cx="32" cy="14" r="1.5" fill="white" opacity="0.5"/>
</svg>
