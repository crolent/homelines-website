<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Roof (dark red) -->
  <polygon points="2,15 24,3 46,15" fill="#EF5350"/>
  <polyline points="2,15 24,3 46,15" fill="none" stroke="#C62828" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Building body (warm beige) -->
  <rect x="5" y="14" width="38" height="30" rx="2" fill="#FFF9C4" stroke="#8D6E63" stroke-width="2"/>
  <!-- Windows row 1 (bright blue) -->
  <rect x="10" y="19" width="9" height="8" rx="1.5" fill="#29B6F6"/>
  <rect x="29" y="19" width="9" height="8" rx="1.5" fill="#29B6F6"/>
  <!-- Windows row 2 (bright blue) -->
  <rect x="10" y="31" width="9" height="8" rx="1.5" fill="#29B6F6"/>
  <rect x="29" y="31" width="9" height="8" rx="1.5" fill="#29B6F6"/>
  <!-- Window pane crosses -->
  <line x1="14.5" y1="19" x2="14.5" y2="27" stroke="white" stroke-width="1.2" opacity="0.7"/>
  <line x1="10"   y1="23" x2="19"   y2="23" stroke="white" stroke-width="1.2" opacity="0.7"/>
  <line x1="33.5" y1="19" x2="33.5" y2="27" stroke="white" stroke-width="1.2" opacity="0.7"/>
  <line x1="29"   y1="23" x2="38"   y2="23" stroke="white" stroke-width="1.2" opacity="0.7"/>
  <!-- Chimney -->
  <rect x="34" y="6" width="5" height="9" rx="1" fill="#8D6E63"/>
</svg>
