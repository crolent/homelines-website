<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Parking sign (blue) -->
  <rect x="8" y="2" width="32" height="26" rx="5" fill="#1565C0"/>
  <rect x="8" y="2" width="32" height="26" rx="5" fill="none" stroke="#0D47A1" stroke-width="1.5"/>
  <!-- Letter P (white, path-based) -->
  <path d="M18 8 L18 24 M18 8 L24 8 Q30 8 30 14 Q30 20 24 20 L18 20"
        fill="none" stroke="white" stroke-width="3"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Sign pole (dark) -->
  <line x1="24" y1="28" x2="24" y2="35" stroke="#546E7A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Car body (bright red) -->
  <rect x="5" y="38" width="38" height="10" rx="3" fill="#EF5350"/>
  <!-- Car cabin (red) -->
  <path d="M12 38 L15 32 L33 32 L36 38 Z" fill="#EF5350" stroke="#C62828" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Car windows (light blue) -->
  <path d="M16 38 L18 34 L30 34 L32 38 Z" fill="#B3E5FC" opacity="0.9"/>
  <!-- Window divider -->
  <line x1="24" y1="34" x2="24" y2="38" stroke="#90A4AE" stroke-width="1"/>
  <!-- Car wheels (dark) -->
  <circle cx="14" cy="45" r="4" fill="#37474F"/>
  <circle cx="34" cy="45" r="4" fill="#37474F"/>
  <!-- Wheel rims (silver) -->
  <circle cx="14" cy="45" r="2" fill="#90A4AE"/>
  <circle cx="34" cy="45" r="2" fill="#90A4AE"/>
  <!-- Headlights (yellow) -->
  <rect x="5"  y="40" width="4" height="2" rx="1" fill="#FFD54F"/>
  <rect x="39" y="40" width="4" height="2" rx="1" fill="#FFD54F"/>
</svg>
