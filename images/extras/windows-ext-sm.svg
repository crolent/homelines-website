<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- Sun (bright yellow) -->
  <circle cx="38" cy="11" r="5" fill="#FFD54F"/>
  <line x1="38" y1="4"  x2="38" y2="2"  stroke="#FF8F00" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="43" y1="6"  x2="45" y2="4"  stroke="#FF8F00" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="45" y1="11" x2="47" y2="11" stroke="#FF8F00" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="43" y1="16" x2="45" y2="18" stroke="#FF8F00" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="33" y1="6"  x2="31" y2="4"  stroke="#FF8F00" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="38" y1="18" x2="38" y2="20" stroke="#FF8F00" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Window frame (white/light gray) -->
  <rect x="4" y="14" width="30" height="28" rx="3" fill="#ECEFF1" stroke="#546E7A" stroke-width="2"/>
  <!-- Glass panes (sky blue) -->
  <rect x="5"  y="15" width="13" height="12" rx="1" fill="#B3E5FC"/>
  <rect x="20" y="15" width="13" height="12" rx="1" fill="#B3E5FC"/>
  <rect x="5"  y="29" width="13" height="12" rx="1" fill="#B3E5FC"/>
  <rect x="20" y="29" width="13" height="12" rx="1" fill="#B3E5FC"/>
  <!-- Cross bars -->
  <line x1="19" y1="14" x2="19" y2="42" stroke="#546E7A" stroke-width="2"/>
  <line x1="4"  y1="28" x2="34" y2="28" stroke="#546E7A" stroke-width="2"/>
  <!-- Sun glare on glass -->
  <circle cx="9" cy="19" r="2.5" fill="#FFD54F" opacity="0.35"/>
</svg>
