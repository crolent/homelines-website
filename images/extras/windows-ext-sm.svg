  <line x1="38" y1="4"  x2="38" y2="2"  stroke="#4db8e8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="43" y1="6"  x2="45" y2="4"  stroke="#4db8e8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="45" y1="11" x2="47" y2="11" stroke="#4db8e8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="43" y1="16" x2="45" y2="18" stroke="#4db8e8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="33" y1="6"  x2="31" y2="4"  stroke="#4db8e8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Window frame -->
